plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keyProperties = new Properties()
def keyPropertiesFile = rootProject.file("key.properties")
if (keyPropertiesFile.exists()) {
    keyProperties.load(new FileInputStream(keyPropertiesFile))
}
def isReleaseTask = gradle.startParameter.taskNames.any { taskName ->
    def lowered = taskName.toLowerCase()
    lowered.contains("release") || lowered.contains("bundle")
}

android {
    namespace = "com.verint.verint_alarm_flutter"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.verint.verint_alarm_flutter"
        minSdk = flutter.minSdkVersion
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            if (keyPropertiesFile.exists()) {
                keyAlias = keyProperties["keyAlias"]
                keyPassword = keyProperties["keyPassword"]
                storeFile = file(keyProperties["storeFile"])
                storePassword = keyProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles(
                getDefaultProguardFile("proguard-android-optimize.txt"),
                "proguard-rules.pro",
            )
            if (keyPropertiesFile.exists()) {
                signingConfig = signingConfigs.release
            } else if (isReleaseTask) {
                throw new GradleException(
                    "Missing android/key.properties for release signing. " +
                    "Copy android/key.properties.example and fill in real keystore values."
                )
            }
        }
    }
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
    implementation "androidx.work:work-runtime-ktx:2.9.1"
}

flutter {
    source = "../.."
}
